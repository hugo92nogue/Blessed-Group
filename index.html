<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blessed Group — Diseño y Construcción · Paraguay</title>
<meta name="description" content="Blessed Group — Excelencia en diseño arquitectónico y construcción en Paraguay. Más de 15 años construyendo el futuro." />
<link rel="icon" href="assets/logo-mark.svg" />
<link rel="stylesheet" href="styles.css" />
<style>
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; font-family: var(--font-body); color: var(--text-strong); background: var(--white); -webkit-font-smoothing: antialiased; }
  a { text-decoration: none; color: inherit; }
  @keyframes bgFadeUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
  .bg-burger { display: none; }
  @media (max-width: 980px) {
    .bg-desk-nav, .bg-desk-cta { display: none !important; }
    .bg-burger { display: inline-flex !important; }
    .bg-about-grid, .bg-contact-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
    .bg-about-float { right: 16px !important; }
    .bg-services-grid, .bg-process-grid, .bg-blog-grid { grid-template-columns: 1fr 1fr !important; }
    .bg-projects-grid { grid-template-columns: 1fr 1fr !important; }
    .bg-stats-grid { grid-template-columns: 1fr 1fr !important; gap: 36px !important; }
    .bg-footer-grid { grid-template-columns: 1fr 1fr !important; }
  }
  @media (max-width: 600px) {
    .bg-services-grid, .bg-process-grid, .bg-blog-grid, .bg-projects-grid, .bg-stats-grid, .bg-footer-grid, .bg-form-row { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="_ds_bundle.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="parts1.jsx"></script>
<script type="text/babel" src="parts2.jsx"></script>
<script type="text/babel">
  const { Header, Hero, About, Stats, Services } = window.BGParts1;
  const { Process, Projects, Blog, CTA, Contact, Footer } = window.BGParts2;
  function App() {
    return (
      <React.Fragment>
        <Header />
        <main>
          <Hero />
          <About />
          <Stats />
          <Services />
          <Process />
          <Projects />
          <Blog />
          <CTA />
          <Contact />
        </main>
        <Footer />
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
